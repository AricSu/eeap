name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-docs.yml'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - 'spec/**'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WEBSITE_BASENAME: /${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify Pages is enabled
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          status="$(
            curl -sS \
              -o /tmp/pages.json \
              -w '%{http_code}' \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          )"

          if [ "${status}" = "200" ]; then
            echo "GitHub Pages is already enabled for ${GITHUB_REPOSITORY}."
            exit 0
          fi

          echo "::error title=Enable GitHub Pages first::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}. Open Settings > Pages and set Source to GitHub Actions, or add a repository secret named PAGES_ENABLEMENT_TOKEN so this workflow can enable Pages automatically."
          cat /tmp/pages.json
          exit 1

      - name: Configure Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v6

      - name: Configure Pages (auto-enable)
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build static docs
        run: npm run docs:build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
